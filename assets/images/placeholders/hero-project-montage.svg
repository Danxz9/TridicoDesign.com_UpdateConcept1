<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Finished Business Graphics Montage</title>
  <desc id="desc">Use a high-impact collage of vehicle wraps, signage, print materials, wall graphics, and installation photos.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070707"/>
      <stop offset="0.55" stop-color="#151515"/>
      <stop offset="1" stop-color="#2c2c2c"/>
    </linearGradient>
    <pattern id="grid" width="90" height="90" patternUnits="userSpaceOnUse">
      <path d="M90 0H0V90" fill="none" stroke="#ffffff" stroke-opacity=".055" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#000" flood-opacity=".35"/>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#grid)"/>
  <path d="M0 1000 L0 700 L500 1000 Z" fill="#EF1D24" opacity=".96"/>
  <path d="M1600 0 L1600 360 L1040 0 Z" fill="#FFD21D" opacity=".98"/>
  <path d="M1260 1000 L1600 1000 L1600 785 L1410 810 Z" fill="#FFD21D" opacity=".78"/>
  <path d="M-80 230 L660 110 L760 210 L0 360 Z" fill="#ffffff" opacity=".08"/>
  <g filter="url(#shadow)">
    <rect x="70" y="84" width="148" height="148" rx="24" fill="#FFD21D"/>
    <rect x="118" y="118" width="52" height="112" fill="#060606"/>
    <rect x="170" y="118" width="38" height="112" fill="#060606" opacity=".75"/>
    <rect x="80" y="720" width="640" height="8" fill="#EF1D24"/>
  </g>
  <text x="80" y="405" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="70" font-weight="800" fill="#ffffff" letter-spacing="1.5"><tspan x="80" dy="0">FINISHED BUSINESS GRAPHICS</tspan><tspan x="80" dy="58">MONTAGE</tspan></text>
  <text x="80" y="620" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="31" fill="#f5f5f5" opacity=".88"><tspan x="80" dy="0">Use a high-impact collage of vehicle wraps,</tspan><tspan x="80" dy="34">signage, print materials, wall graphics, and</tspan><tspan x="80" dy="34">installation photos.</tspan></text>
  <text x="80" y="800" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" fill="#FFD21D" letter-spacing="5">IMAGE SLOT / REPLACE WITH REAL PROJECT PHOTO</text>
  <circle cx="1360" cy="760" r="150" fill="none" stroke="#ffffff" stroke-opacity=".12" stroke-width="2"/>
  <circle cx="1360" cy="760" r="90" fill="none" stroke="#FFD21D" stroke-opacity=".8" stroke-width="8"/>
</svg>