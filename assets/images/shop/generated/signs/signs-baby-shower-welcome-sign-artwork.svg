<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200" role="img" aria-label="Baby Shower Welcome Sign standalone artwork">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f1f5f9"/><stop offset="1" stop-color="#d7dde7"/></linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#111827"/><stop offset="1" stop-color="#facc15"/></linearGradient>
    <linearGradient id="darkGloss" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff" stop-opacity=".26"/><stop offset=".35" stop-color="#ffffff" stop-opacity=".05"/><stop offset="1" stop-color="#000000" stop-opacity=".16"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#0f172a" flood-opacity=".24"/></filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="9" stdDeviation="9" flood-color="#0f172a" flood-opacity=".2"/></filter>
    <filter id="paperNoise"><feTurbulence type="fractalNoise" baseFrequency=".75" numOctaves="3" seed="0" result="noise"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="table" tableValues="0 .08"/></feComponentTransfer></filter>
  </defs>
  <rect width="1200" height="1200" fill="url(#bg)"/>
  <rect x="90" y="90" width="1020" height="1020" rx="64" fill="#fff" filter="url(#shadow)"/>
  <rect x="130" y="130" width="940" height="940" rx="42" fill="#f1f5f9"/>
  <rect x="160" y="160" width="880" height="70" rx="35" fill="#fff" opacity=".78"/>
  <text x="600" y="207" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="900" fill="#111827">PRINT READY ARTWORK</text>
  <g transform="translate(210 252)"><rect width="780" height="580" rx="58" fill="#fff" stroke="#ffffff" stroke-width="19.5" filter="url(#softShadow)"/><rect x="39" y="29" width="702" height="104.39999999999999" rx="26.099999999999998" fill="url(#accent)"/><rect x="62.4" y="440.8" width="655.1999999999999" height="46.4" rx="17.4" fill="#ffffff" opacity=".12"/><text x="390" y="249.4" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="900" fill="#ffffff">WELCOME</text></g>
  <rect x="220" y="910" width="760" height="96" rx="48" fill="#fff" opacity=".86"/>
  <text x="600" y="953" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="850" fill="#111827">Baby Shower Welcome Sign</text>
  <text x="600" y="1044" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800" fill="#64748b">1 printed sign</text>
  <rect width="1200" height="1200" fill="#fff" filter="url(#paperNoise)" opacity=".35"/>
</svg>